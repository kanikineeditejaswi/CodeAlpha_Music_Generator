<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakura Melody AI</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
</head>
<body>

<div class="petals"></div>

<div class="container">

    <h1>🌸 Sakura Melody AI</h1>
    
    <p class="subtitle">Create Beautiful AI Generated Melodies</p>

    <div class="music-disc"></div>

    <div class="notes-box">
        <h3>Generated Melody</h3>
        <p id="output">Click Generate Melody</p>
    </div>

    <button id="generateBtn">Generate Melody</button>

    <div class="controls">
        <button id="playBtn">▶</button>
        <button id="stopBtn">■</button>
    </div>

    <div class="equalizer">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

</div>

<script src="script.js"></script>

</html>
